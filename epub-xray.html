<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EPUB X-Ray</title>
<style>
:root {
  --bg-deep: #0d0d1a;
  --bg-surface: #151528;
  --bg-elevated: #1e1e36;
  --bg-hover: #282848;
  --bg-selected: rgba(124, 92, 191, 0.18);
  --border: #2a2a4a;
  --border-light: #353560;
  --text-primary: #e0e0ec;
  --text-secondary: #9090b0;
  --text-muted: #606080;
  --accent: #8b6fc0;
  --accent-hover: #a080d8;
  --accent-bg: rgba(139, 111, 192, 0.15);
  --warning: #e0a030;
  --error: #d85050;
  --success: #40b060;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 6px;
  --sidebar-width: 280px;
}
body.light {
  --bg-deep: #f0f0f5;
  --bg-surface: #ffffff;
  --bg-elevated: #f5f5fa;
  --bg-hover: #e8e8f0;
  --bg-selected: rgba(124, 92, 191, 0.12);
  --border: #d0d0e0;
  --border-light: #c0c0d8;
  --text-primary: #1a1a2e;
  --text-secondary: #555570;
  --text-muted: #8888a0;
  --accent: #7b5ea7;
  --accent-hover: #6a4e96;
  --accent-bg: rgba(139, 111, 192, 0.1);
  --warning: #c08820;
  --error: #c04040;
  --success: #309850;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* Upload Screen */
#upload-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--bg-deep);
}
.upload-container {
  text-align: center;
  max-width: 480px;
  padding: 2rem;
}
.upload-logo {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  filter: drop-shadow(0 0 12px rgba(139,111,192,0.3));
}
.upload-container h1 {
  font-size: 1.75rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, var(--accent), #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.upload-container > p {
  color: var(--text-secondary);
  margin-bottom: 2rem;
  font-size: 0.95rem;
}
#drop-zone {
  border: 2px dashed var(--border-light);
  border-radius: 12px;
  padding: 3rem 2rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--bg-surface);
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-bg);
}
#drop-zone p {
  color: var(--text-secondary);
  margin-bottom: 0.75rem;
  font-size: 0.9rem;
}
#drop-zone p:last-of-type { margin-bottom: 0; }
.drop-or {
  color: var(--text-muted) !important;
  font-size: 0.8rem !important;
}
.upload-btn {
  display: inline-block;
  margin-top: 0.75rem;
  padding: 0.6rem 1.5rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.upload-btn:hover { background: var(--accent-hover); }
.privacy-note {
  margin-top: 1.5rem;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* X-Ray Viewer */
#xray-viewer {
  display: none;
  flex-direction: column;
  height: 100vh;
}

/* Header */
#xray-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1rem;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 44px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  min-width: 0;
}
.header-icon { font-size: 1.25rem; flex-shrink: 0; }
#theme-toggle {
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.25rem;
  line-height: 1;
  opacity: 0.7;
  transition: opacity 0.2s;
}
#theme-toggle:hover { opacity: 1; }
#epub-title {
  font-size: 0.95rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#new-file-btn {
  padding: 0.35rem 1rem;
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
  border-radius: 999px;
  font-size: 0.8rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
#new-file-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
}
#audiobook-btn {
  padding: 0.35rem 1rem;
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
  border-radius: 999px;
  font-size: 0.8rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
#audiobook-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
}

/* Main layout */
#xray-main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* File tree sidebar */
#file-tree-panel {
  width: var(--sidebar-width);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
  flex-shrink: 0;
}
.panel-header h2 {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}
#file-tree {
  flex: 1;
  overflow: auto;
  padding: 0.25rem 0;
}
#file-tree::-webkit-scrollbar { width: 6px; }
#file-tree::-webkit-scrollbar-track { background: transparent; }
#file-tree::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

/* Tree nodes */
.tree-row {
  display: flex;
  align-items: center;
  padding: 0.3rem 0.5rem;
  cursor: pointer;
  border-radius: 3px;
  margin: 0 0.25rem;
  transition: background 0.12s;
  user-select: none;
  font-size: 0.85rem;
  line-height: 1.3;
}
.tree-row:hover { background: var(--bg-hover); }
.tree-row.selected {
  background: var(--bg-selected);
  color: var(--accent);
}
.tree-chevron {
  width: 16px;
  flex-shrink: 0;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
}
.tree-icon {
  margin-right: 0.4rem;
  flex-shrink: 0;
  font-size: 0.9rem;
  line-height: 1;
}
.tree-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-size {
  margin-left: 0.5rem;
  font-size: 0.7rem;
  color: var(--text-muted);
  flex-shrink: 0;
  font-family: var(--font-mono);
}
.tree-error {
  padding: 1rem;
  color: var(--error);
  font-size: 0.85rem;
  text-align: center;
}
.tree-error p:first-child { font-weight: 600; margin-bottom: 0.25rem; }
.tree-error p:last-child { font-size: 0.75rem; opacity: 0.7; }

/* Content panel */
#content-panel {
  flex: 1;
  overflow: hidden;
  background: var(--bg-deep);
  display: flex;
  flex-direction: column;
}

/* Empty state */
#content-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
}
.empty-icon {
  font-size: 3rem;
  opacity: 0.3;
  margin-bottom: 0.75rem;
}
#content-empty p { font-size: 0.9rem; }

/* Content viewer */
#content-viewer {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
#content-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1rem;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 0.5rem;
  flex-wrap: wrap;
}
#content-filename {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
#content-actions {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}

/* Source/Preview toggle */
#view-toggle {
  display: none;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  overflow: hidden;
}
.toggle-btn {
  padding: 0.25rem 0.6rem;
  font-size: 0.75rem;
  border: none;
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn:hover { background: var(--bg-hover); }
.toggle-btn.active {
  background: var(--accent);
  color: #fff;
}

/* Copy button */
#copy-btn {
  padding: 0.25rem 0.6rem;
  font-size: 0.75rem;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}
#copy-btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
}

/* Content info (line count, size) */
#content-info {
  font-size: 0.72rem;
  color: var(--text-muted);
  white-space: nowrap;
}

/* Content body */
#content-body {
  flex: 1;
  overflow: auto;
}
#content-body::-webkit-scrollbar { width: 8px; height: 8px; }
#content-body::-webkit-scrollbar-track { background: transparent; }
#content-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

/* Source code table */
.source-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.5;
}
.source-line:hover { background: rgba(255,255,255,0.02); }
.line-number {
  text-align: right;
  padding: 0 1rem 0 0.5rem;
  color: var(--text-muted);
  border-right: 1px solid var(--border);
  user-select: none;
  vertical-align: top;
  white-space: nowrap;
  opacity: 0.6;
}
.line-content {
  padding: 0 0.5rem 0 1rem;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Image display */
.image-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  min-height: 100%;
  background: rgba(255,255,255,0.01);
}
.image-container img {
  max-width: 100%;
  max-height: calc(100vh - 200px);
  object-fit: contain;
  border-radius: var(--radius);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.image-info {
  margin-top: 0.75rem;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Binary card */
.binary-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  padding: 2rem;
}
.binary-icon { font-size: 3rem; opacity: 0.4; margin-bottom: 1rem; }
.binary-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
.binary-name { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.25rem; }
.binary-size { font-size: 0.8rem; color: var(--text-muted); }

/* Audio player */
.audio-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  padding: 2rem;
  gap: 1rem;
}
.audio-icon { font-size: 3rem; opacity: 0.6; }
.audio-name { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
.audio-size { font-size: 0.8rem; color: var(--text-muted); }
.audio-card audio { max-width: 400px; width: 100%; }

/* Preview iframe */
.preview-iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: var(--bg-deep);
}

/* Content error */
.content-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  color: var(--error);
  text-align: center;
  padding: 2rem;
}
.error-title { font-weight: 600; margin-bottom: 0.25rem; }

/* Loading spinner */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.85rem;
  min-height: 100%;
}
.loading::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid var(--border-light);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin-right: 0.5rem;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Audiobook results */
.audiobook-results {
  padding: 1.5rem;
  font-family: var(--font-sans);
}
.audiobook-results h2 {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
  color: var(--text-primary);
}
.audiobook-summary {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 1.25rem;
}
.audiobook-section {
  margin-bottom: 1rem;
  padding: 0.75rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.audiobook-section h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.4rem;
  color: var(--accent);
}
.audiobook-section .clip-list {
  list-style: none;
  font-size: 0.8rem;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}
.audiobook-section .clip-list li {
  padding: 0.15rem 0;
}
.audiobook-section .clip-list li::before {
  content: '\25B6  ';
  font-size: 0.6rem;
  color: var(--text-muted);
}
.audiobook-command {
  margin-top: 1.25rem;
}
.audiobook-command h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text-primary);
}
.audiobook-command pre {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  line-height: 1.5;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-all;
}
.audiobook-copy-btn {
  margin-top: 0.75rem;
  padding: 0.5rem 1.25rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.audiobook-copy-btn:hover { background: var(--accent-hover); }
.audiobook-none {
  padding: 2rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.95rem;
}

/* Responsive */
@media (max-width: 768px) {
  #xray-main { flex-direction: column; }
  #file-tree-panel {
    width: 100%;
    max-height: 40vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
}
</style>
</head>
<body>

<!-- Upload Screen -->
<div id="upload-screen">
  <div class="upload-container">
    <div class="upload-logo">&#128230;</div>
    <h1>EPUB X-Ray</h1>
    <p>Explore the internal structure of any EPUB file.<br>Everything runs in your browser — nothing is uploaded.</p>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <p>Drag &amp; drop an .epub file here</p>
      <p class="drop-or">or</p>
      <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Choose File</button>
    </div>
    <input type="file" id="file-input" accept=".epub" hidden>
    <p class="privacy-note">Your file never leaves your browser. All processing is done locally.</p>
  </div>
</div>

<!-- X-Ray Viewer -->
<div id="xray-viewer">
  <header id="xray-header">
    <div class="header-left">
      <span class="header-icon">&#128230;</span>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀️</button>
      <h1 id="epub-title"></h1>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-shrink:0;">
      <button id="audiobook-btn" style="display:none;" onclick="generateAudiobook()">Audiobook</button>
      <button id="new-file-btn" onclick="resetToUpload()">New File</button>
    </div>
  </header>
  <div id="xray-main">
    <aside id="file-tree-panel">
      <div class="panel-header"><h2>FILES</h2></div>
      <div id="file-tree"></div>
    </aside>
    <main id="content-panel">
      <div id="content-empty">
        <span class="empty-icon">&#128196;</span>
        <p>Select a file to view its contents</p>
      </div>
      <div id="content-viewer">
        <div id="content-header">
          <span id="content-filename"></span>
          <div id="content-actions">
            <div id="view-toggle">
              <button class="toggle-btn active" data-mode="source">Source</button>
              <button class="toggle-btn" data-mode="preview">Preview</button>
            </div>
            <button id="copy-btn" style="display:none" onclick="copyContent()">Copy</button>
            <span id="content-info"></span>
          </div>
        </div>
        <div id="content-body"></div>
      </div>
    </main>
  </div>
</div>

<!-- JSZip library (external) -->
<script src="js/jszip.min.js"></script>

<!-- Application logic -->
<script>
// ── Theme toggle (outside IIFE so onclick can reach it) ──
function toggleTheme() {
  var isLight = document.body.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀️';
  try { localStorage.setItem('epub-xray-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}
// Restore saved theme on load
(function() {
  try {
    if (localStorage.getItem('epub-xray-theme') === 'light') {
      document.body.classList.add('light');
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = '🌙';
      });
    }
  } catch(e) {}
})();

(function() {
  'use strict';

  // ── State ──
  var currentZip = null;
  var currentTree = null;
  var selectedPath = null;
  var currentContent = null;
  var currentViewMode = 'source';
  var currentImageUrl = null;

  // ── Image signature detection (from xrayService.ts) ──
  var IMAGE_SIGNATURES = [
    { bytes: [0xff, 0xd8, 0xff] },       // JPEG
    { bytes: [0x89, 0x50, 0x4e, 0x47] },  // PNG
    { bytes: [0x47, 0x49, 0x46, 0x38] },  // GIF
  ];

  function isWebP(bytes) {
    if (bytes.length < 12) return false;
    if (bytes[0] !== 0x52 || bytes[1] !== 0x49 || bytes[2] !== 0x46 || bytes[3] !== 0x46) return false;
    return bytes[8] === 0x57 && bytes[9] === 0x45 && bytes[10] === 0x42 && bytes[11] === 0x50;
  }

  function getMimeType(bytes) {
    if (bytes.length >= 3 && bytes[0] === 0xff && bytes[1] === 0xd8 && bytes[2] === 0xff) return 'image/jpeg';
    if (bytes.length >= 4 && bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4e && bytes[3] === 0x47) return 'image/png';
    if (bytes.length >= 4 && bytes[0] === 0x47 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[3] === 0x38) return 'image/gif';
    if (isWebP(bytes)) return 'image/webp';
    var decoder = new TextDecoder('utf-8', { fatal: false });
    var text = decoder.decode(bytes.slice(0, 256));
    if (text.indexOf('<svg') !== -1) return 'image/svg+xml';
    return 'application/octet-stream';
  }

  function arrayBufferToBase64(buffer) {
    var bytes = new Uint8Array(buffer);
    var binary = '';
    for (var i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  function checkImageSignature(bytes) {
    for (var s = 0; s < IMAGE_SIGNATURES.length; s++) {
      var sig = IMAGE_SIGNATURES[s];
      if (bytes.length >= sig.bytes.length) {
        var match = true;
        for (var i = 0; i < sig.bytes.length; i++) {
          if (bytes[i] !== sig.bytes[i]) { match = false; break; }
        }
        if (match) return true;
      }
    }
    return isWebP(bytes);
  }

  // ── Audio detection ──
  function isAudioFile(fileName) {
    var ext = fileName.split('.').pop().toLowerCase();
    return ['mp3', 'ogg', 'wav', 'flac', 'aac', 'm4a', 'opus', 'webm'].indexOf(ext) !== -1;
  }

  function getAudioMime(fileName) {
    var ext = fileName.split('.').pop().toLowerCase();
    var mimes = {
      mp3: 'audio/mpeg', ogg: 'audio/ogg', wav: 'audio/wav',
      flac: 'audio/flac', aac: 'audio/aac', m4a: 'audio/mp4',
      opus: 'audio/opus', webm: 'audio/webm'
    };
    return mimes[ext] || 'audio/mpeg';
  }

  // ── Binary detection (from xrayService.ts) ──
  function isBinaryContent(text) {
    if (text.indexOf('\x00') !== -1) return true;
    var nonPrintable = 0;
    var sampleSize = Math.min(text.length, 1000);
    if (sampleSize === 0) return false;
    for (var i = 0; i < sampleSize; i++) {
      var code = text.charCodeAt(i);
      if (code < 32 && code !== 9 && code !== 10 && code !== 13) nonPrintable++;
      if (code === 0xfffd) nonPrintable++;
    }
    return nonPrintable / sampleSize > 0.1;
  }

  // ── Format file size (from xrayService.ts) ──
  function formatFileSize(bytes) {
    if (bytes === 0) return '0 B';
    var k = 1024;
    var sizes = ['B', 'KB', 'MB', 'GB'];
    var i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  // ── Load epub structure (from xrayService.ts) ──
  function loadEpubStructure(file) {
    return JSZip.loadAsync(file).then(function(zip) {
      var entries = [];
      var keys = Object.keys(zip.files);
      for (var k = 0; k < keys.length; k++) {
        var relativePath = keys[k];
        var zipEntry = zip.files[relativePath];
        if (!zipEntry) continue;
        var parts = relativePath.split('/').filter(Boolean);
        entries.push({
          path: relativePath,
          name: parts[parts.length - 1] || relativePath,
          isDirectory: zipEntry.dir,
          size: (zipEntry._data && zipEntry._data.uncompressedSize) ? zipEntry._data.uncompressedSize : 0,
        });
      }
      var tree = buildTreeFromPaths(entries);
      return { zip: zip, tree: tree };
    });
  }

  // ── Build tree from flat paths (from xrayService.ts) ──
  function buildTreeFromPaths(entries) {
    var root = { name: '/', path: '', isDirectory: true, size: 0, children: [] };

    entries.sort(function(a, b) {
      if (a.isDirectory !== b.isDirectory) return a.isDirectory ? -1 : 1;
      return a.path.localeCompare(b.path);
    });

    for (var e = 0; e < entries.length; e++) {
      var entry = entries[e];
      var parts = entry.path.split('/').filter(Boolean);
      var current = root;

      for (var i = 0; i < parts.length; i++) {
        var part = parts[i];
        var isLast = (i === parts.length - 1);
        var currentPath = parts.slice(0, i + 1).join('/');

        if (!current.children) current.children = [];

        var child = null;
        for (var c = 0; c < current.children.length; c++) {
          if (current.children[c].name === part) { child = current.children[c]; break; }
        }

        if (!child) {
          child = {
            name: part || '',
            path: isLast ? entry.path : currentPath + '/',
            isDirectory: isLast ? entry.isDirectory : true,
            size: isLast ? entry.size : 0,
            children: (isLast && !entry.isDirectory) ? undefined : [],
          };
          current.children.push(child);
        }

        current = child;
      }
    }

    sortChildren(root);
    return root;
  }

  function sortChildren(node) {
    if (node.children) {
      node.children.sort(function(a, b) {
        if (a.isDirectory !== b.isDirectory) return a.isDirectory ? -1 : 1;
        return a.name.localeCompare(b.name);
      });
      for (var i = 0; i < node.children.length; i++) {
        sortChildren(node.children[i]);
      }
    }
  }

  // ── Get file content (from xrayService.ts) ──
  function getFileContent(zip, path) {
    var file = zip.file(path);
    if (!file) return Promise.reject(new Error('File not found: ' + path));

    return file.async('arraybuffer').then(function(arrayBuffer) {
      var bytes = new Uint8Array(arrayBuffer);
      var size = bytes.length;

      if (checkImageSignature(bytes)) {
        return { type: 'image', content: new Blob([arrayBuffer]), size: size };
      }

      var audioFileName = path.split('/').pop() || '';
      if (isAudioFile(audioFileName)) {
        return { type: 'audio', content: new Blob([arrayBuffer]), size: size, fileName: audioFileName };
      }

      var decoder = new TextDecoder('utf-8', { fatal: false });
      var text = decoder.decode(bytes);

      if (isBinaryContent(text)) {
        return { type: 'binary', content: new Blob([arrayBuffer]), size: size };
      }

      if (text.indexOf('<svg') !== -1) {
        return { type: 'svg', content: new Blob([text], { type: 'image/svg+xml' }), size: size };
      }

      return { type: 'text', content: text, size: size };
    });
  }

  // ── Path resolution (from XrayContentViewer.tsx) ──
  function resolvePath(baseDir, relativePath) {
    var parts = (baseDir + relativePath).split('/');
    var resolved = [];
    for (var i = 0; i < parts.length; i++) {
      if (parts[i] === '..') resolved.pop();
      else if (parts[i] !== '.' && parts[i] !== '') resolved.push(parts[i]);
    }
    return resolved.join('/');
  }

  // ── Inline CSS stylesheets for preview (from XrayContentViewer.tsx) ──
  function inlineStylesheets(html, zip, basePath) {
    var baseDir = basePath.substring(0, basePath.lastIndexOf('/') + 1);
    var linkRegex = /<link\b[^>]*>/gi;
    var result = html;
    var matches = [];
    var match;

    while ((match = linkRegex.exec(html)) !== null) {
      var tag = match[0];
      if (!/rel=["']stylesheet["']/i.test(tag)) continue;
      var hrefMatch = /href=["']([^"']+)["']/i.exec(tag);
      if (hrefMatch && hrefMatch[1]) {
        matches.push({ fullMatch: tag, href: hrefMatch[1] });
      }
    }

    var chain = Promise.resolve(result);
    matches.forEach(function(m) {
      chain = chain.then(function(currentResult) {
        var cssPath = resolvePath(baseDir, m.href);
        return getFileContent(zip, cssPath).then(function(cssContent) {
          if (cssContent.type === 'text' && typeof cssContent.content === 'string') {
            return currentResult.replace(m.fullMatch, '<style>' + cssContent.content + '</style>');
          }
          return currentResult;
        }).catch(function() {
          return currentResult;
        });
      });
    });

    return chain;
  }

  // ── Inline images for preview ──
  function inlineImages(html, zip, basePath) {
    var baseDir = basePath.substring(0, basePath.lastIndexOf('/') + 1);
    var imgRegex = /<img\b[^>]*>/gi;
    var result = html;
    var matches = [];
    var match;

    while ((match = imgRegex.exec(html)) !== null) {
      var tag = match[0];
      var srcMatch = /src=["']([^"']+)["']/i.exec(tag);
      if (!srcMatch || !srcMatch[1]) continue;
      var src = srcMatch[1];
      if (/^(data:|https?:)/i.test(src)) continue;
      matches.push({ fullMatch: tag, src: src });
    }

    var chain = Promise.resolve(result);
    matches.forEach(function(m) {
      chain = chain.then(function(currentResult) {
        var imgPath = resolvePath(baseDir, m.src);
        var file = zip.file(imgPath);
        if (!file) return currentResult;
        return file.async('arraybuffer').then(function(arrayBuffer) {
          var bytes = new Uint8Array(arrayBuffer);
          var mime = getMimeType(bytes);
          var b64 = arrayBufferToBase64(arrayBuffer);
          var dataUrl = 'data:' + mime + ';base64,' + b64;
          var newTag = m.fullMatch.replace(m.src, dataUrl);
          return currentResult.replace(m.fullMatch, newTag);
        }).catch(function() {
          return currentResult;
        });
      });
    });

    return chain;
  }

  // ── HTML escaping ──
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Cleanup object URLs ──
  function cleanupImageUrl() {
    if (currentImageUrl) {
      URL.revokeObjectURL(currentImageUrl);
      currentImageUrl = null;
    }
  }

  // ── Render file tree (from XrayFileTree.tsx) ──
  function renderFileTree(tree) {
    var container = document.getElementById('file-tree');
    container.innerHTML = '';
    if (tree.name === '/' && tree.children) {
      for (var i = 0; i < tree.children.length; i++) {
        container.appendChild(createTreeNode(tree.children[i], 0, true));
      }
    }
  }

  function createTreeNode(node, depth, defaultExpanded) {
    var wrapper = document.createElement('div');
    wrapper.className = 'tree-node';

    var row = document.createElement('div');
    row.className = 'tree-row';
    row.style.paddingLeft = (depth * 16 + 8) + 'px';
    row.setAttribute('data-path', node.path);

    // Chevron
    var chevron = document.createElement('span');
    chevron.className = 'tree-chevron';
    if (node.isDirectory) {
      chevron.textContent = defaultExpanded ? '\u25BE' : '\u25B8';
    }
    row.appendChild(chevron);

    // Icon
    var icon = document.createElement('span');
    icon.className = 'tree-icon';
    if (node.isDirectory) {
      icon.textContent = defaultExpanded ? '\uD83D\uDCC2' : '\uD83D\uDCC1';
    } else {
      icon.textContent = '\uD83D\uDCC4';
    }
    row.appendChild(icon);

    // Name
    var name = document.createElement('span');
    name.className = 'tree-name';
    name.textContent = node.name;
    row.appendChild(name);

    // Size (for files only)
    if (!node.isDirectory && node.size > 0) {
      var size = document.createElement('span');
      size.className = 'tree-size';
      size.textContent = formatFileSize(node.size);
      row.appendChild(size);
    }

    // Directory toggle
    if (node.isDirectory) {
      chevron.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleDir(wrapper, node, chevron, icon);
      });
      row.addEventListener('click', function() {
        toggleDir(wrapper, node, chevron, icon);
      });
    } else {
      row.addEventListener('click', function() {
        selectFile(node.path);
      });
    }

    wrapper.appendChild(row);

    // Children container
    if (node.isDirectory && node.children) {
      var childrenEl = document.createElement('div');
      childrenEl.className = 'tree-children';
      childrenEl.style.display = defaultExpanded ? 'block' : 'none';
      for (var i = 0; i < node.children.length; i++) {
        childrenEl.appendChild(createTreeNode(node.children[i], depth + 1, defaultExpanded));
      }
      wrapper.appendChild(childrenEl);
    }

    return wrapper;
  }

  function toggleDir(wrapper, node, chevron, icon) {
    var children = wrapper.querySelector(':scope > .tree-children');
    if (!children) return;
    var isOpen = children.style.display !== 'none';
    children.style.display = isOpen ? 'none' : 'block';
    chevron.textContent = isOpen ? '\u25B8' : '\u25BE';
    if (node.isDirectory) {
      icon.textContent = isOpen ? '\uD83D\uDCC1' : '\uD83D\uDCC2';
    }
  }

  // ── File selection & content rendering (from XrayContentViewer.tsx) ──
  function selectFile(path) {
    // Update tree selection
    var prev = document.querySelectorAll('.tree-row.selected');
    for (var i = 0; i < prev.length; i++) prev[i].classList.remove('selected');
    // Use attribute selector with escaped value
    var rows = document.querySelectorAll('.tree-row');
    for (var j = 0; j < rows.length; j++) {
      if (rows[j].getAttribute('data-path') === path) {
        rows[j].classList.add('selected');
        break;
      }
    }

    selectedPath = path;
    var fileName = path.split('/').pop() || path;

    // Show viewer, hide empty state
    document.getElementById('content-empty').style.display = 'none';
    var viewer = document.getElementById('content-viewer');
    viewer.style.display = 'flex';

    // Reset
    cleanupImageUrl();
    currentViewMode = 'source';
    document.getElementById('content-filename').textContent = fileName;
    document.getElementById('content-info').textContent = '';
    document.getElementById('view-toggle').style.display = 'none';
    document.getElementById('copy-btn').style.display = 'none';
    document.getElementById('content-body').innerHTML = '<div class="loading">Loading...</div>';

    getFileContent(currentZip, path).then(function(result) {
      currentContent = result;
      renderContent(result, fileName, path);
    }).catch(function(err) {
      document.getElementById('content-body').innerHTML =
        '<div class="content-error"><p class="error-title">Error loading file</p><p>' +
        escapeHtml(err.message) + '</p></div>';
    });
  }

  function renderContent(content, fileName, filePath) {
    var body = document.getElementById('content-body');
    var copyBtn = document.getElementById('copy-btn');
    var infoEl = document.getElementById('content-info');
    var toggleEl = document.getElementById('view-toggle');

    // Audio
    if (content.type === 'audio') {
      cleanupImageUrl();
      var audioUrl = URL.createObjectURL(content.content);
      currentImageUrl = audioUrl;
      var mime = getAudioMime(fileName);
      body.innerHTML =
        '<div class="audio-card">' +
        '<span class="audio-icon">&#127925;</span>' +
        '<p class="audio-name">' + escapeHtml(fileName) + '</p>' +
        '<p class="audio-size">' + formatFileSize(content.size) + '</p>' +
        '<audio controls preload="metadata"><source src="' + audioUrl + '" type="' + mime + '">Your browser does not support audio playback.</audio>' +
        '</div>';
      copyBtn.style.display = 'none';
      infoEl.textContent = formatFileSize(content.size);
      toggleEl.style.display = 'none';
      return;
    }

    // Binary
    if (content.type === 'binary') {
      body.innerHTML =
        '<div class="binary-card">' +
        '<span class="binary-icon">\uD83D\uDCC4</span>' +
        '<p class="binary-title">Cannot display file</p>' +
        '<p class="binary-name">' + escapeHtml(fileName) + '</p>' +
        '<p class="binary-size">' + formatFileSize(content.size) + '</p></div>';
      copyBtn.style.display = 'none';
      infoEl.textContent = formatFileSize(content.size);
      toggleEl.style.display = 'none';
      return;
    }

    // Image or SVG
    if (content.type === 'image' || content.type === 'svg') {
      cleanupImageUrl();
      var url = URL.createObjectURL(content.content);
      currentImageUrl = url;
      body.innerHTML =
        '<div class="image-container">' +
        '<img src="' + url + '" alt="' + escapeHtml(fileName) + '">' +
        '<p class="image-info">' + escapeHtml(fileName) + ' (' + formatFileSize(content.size) + ')</p></div>';
      copyBtn.style.display = 'none';
      infoEl.textContent = formatFileSize(content.size);
      toggleEl.style.display = 'none';
      return;
    }

    // Text
    if (content.type === 'text') {
      var isHtml = /\.(xhtml|html|htm)$/i.test(fileName);
      copyBtn.style.display = 'inline-block';

      if (isHtml) {
        toggleEl.style.display = 'flex';
        var btns = toggleEl.querySelectorAll('.toggle-btn');
        for (var i = 0; i < btns.length; i++) {
          btns[i].classList.toggle('active', btns[i].getAttribute('data-mode') === 'source');
        }
      } else {
        toggleEl.style.display = 'none';
      }

      var lines = content.content.split('\n');
      infoEl.textContent = lines.length + ' lines \u2022 ' + formatFileSize(content.size);
      renderSourceView(lines);
    }
  }

  function renderSourceView(lines) {
    var body = document.getElementById('content-body');
    var lineNumWidth = String(lines.length).length;

    // Build table. For very large files use document fragment for performance
    var table = document.createElement('table');
    table.className = 'source-table';
    var tbody = document.createElement('tbody');

    for (var i = 0; i < lines.length; i++) {
      var tr = document.createElement('tr');
      tr.className = 'source-line';

      var tdNum = document.createElement('td');
      tdNum.className = 'line-number';
      tdNum.style.width = (lineNumWidth + 2) + 'ch';
      tdNum.textContent = i + 1;

      var tdContent = document.createElement('td');
      tdContent.className = 'line-content';
      tdContent.textContent = lines[i] || '\u00A0';

      tr.appendChild(tdNum);
      tr.appendChild(tdContent);
      tbody.appendChild(tr);
    }

    table.appendChild(tbody);
    body.innerHTML = '';
    body.appendChild(table);
  }

  function showPreview(filePath) {
    var body = document.getElementById('content-body');
    body.innerHTML = '<div class="loading">Processing preview...</div>';

    inlineStylesheets(currentContent.content, currentZip, filePath)
    .then(function(html) { return inlineImages(html, currentZip, filePath); })
    .then(function(html) {
      // Inject theme-aware background into srcdoc
      var isDark = !document.body.classList.contains('light');
      if (isDark) {
        var darkCss = '<style>html{background-color:#151528;color:#e0e0ec}</style>';
        if (html.indexOf('</head>') !== -1) {
          html = html.replace('</head>', darkCss + '</head>');
        } else {
          html = darkCss + html;
        }
      }

      var iframe = document.createElement('iframe');
      iframe.className = 'preview-iframe';
      iframe.sandbox = '';
      iframe.title = 'Preview';
      iframe.srcdoc = html;
      body.innerHTML = '';
      body.appendChild(iframe);
    }).catch(function() {
      body.innerHTML = '<div class="content-error"><p class="error-title">Failed to generate preview</p></div>';
    });
  }

  // ── Copy to clipboard ──
  window.copyContent = function() {
    if (!currentContent || currentContent.type !== 'text' || typeof currentContent.content !== 'string') return;
    var btn = document.getElementById('copy-btn');
    navigator.clipboard.writeText(currentContent.content).then(function() {
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
    }).catch(function() {
      // Fallback: select from a temporary textarea
      var ta = document.createElement('textarea');
      ta.value = currentContent.content;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
      } catch(e) {
        btn.textContent = 'Failed';
        setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
      }
      document.body.removeChild(ta);
    });
  };

  // ── Generate Audiobook command ──
  window.generateAudiobook = function() {
    if (!currentZip) return;

    // Show in content panel
    document.getElementById('content-empty').style.display = 'none';
    var viewer = document.getElementById('content-viewer');
    viewer.style.display = 'flex';
    document.getElementById('content-filename').textContent = 'Audiobook';
    document.getElementById('content-info').textContent = '';
    document.getElementById('view-toggle').style.display = 'none';
    document.getElementById('copy-btn').style.display = 'none';
    document.getElementById('content-body').innerHTML = '<div class="loading">Analyzing audio structure...</div>';

    // Deselect any file in tree
    var prev = document.querySelectorAll('.tree-row.selected');
    for (var i = 0; i < prev.length; i++) prev[i].classList.remove('selected');

    generateAudiobookCommand().then(function(result) {
      renderAudiobookResults(result);
    }).catch(function(err) {
      document.getElementById('content-body').innerHTML =
        '<div class="content-error"><p class="error-title">Error analyzing audio</p><p>' +
        escapeHtml(err.message) + '</p></div>';
    });
  };

  function generateAudiobookCommand() {
    // Step 1: Read content.opf to get spine order and manifest
    var opfPath = null;
    var keys = Object.keys(currentZip.files);
    for (var k = 0; k < keys.length; k++) {
      if (/content\.opf$/i.test(keys[k])) { opfPath = keys[k]; break; }
    }
    if (!opfPath) return Promise.reject(new Error('No content.opf found in EPUB'));

    var opfDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);

    return currentZip.file(opfPath).async('string').then(function(opfXml) {
      var parser = new DOMParser();
      var opfDoc = parser.parseFromString(opfXml, 'application/xml');

      // Build manifest map: id -> href
      var manifestMap = {};
      var manifestItems = opfDoc.querySelectorAll('manifest > item');
      for (var m = 0; m < manifestItems.length; m++) {
        var item = manifestItems[m];
        var id = item.getAttribute('id');
        var href = item.getAttribute('href');
        if (id && href) manifestMap[id] = href;
      }

      // Build spine order: array of idrefs
      var spineOrder = [];
      var spineItems = opfDoc.querySelectorAll('spine > itemref');
      for (var s = 0; s < spineItems.length; s++) {
        var idref = spineItems[s].getAttribute('idref');
        if (idref) spineOrder.push(idref);
      }

      // Step 2: Read meta.json for sceneCraftConfig
      var metaPath = opfDir + 'meta.json';
      var metaFile = currentZip.file(metaPath);
      if (!metaFile) return Promise.reject(new Error('No OEBPS/meta.json found - this EPUB may not have SceneCraft audio'));

      return metaFile.async('string').then(function(metaJson) {
        var meta = JSON.parse(metaJson);
        var sections = meta.sections || [];

        // Build section lookup by id
        var sectionMap = {};
        for (var i = 0; i < sections.length; i++) {
          var sec = sections[i];
          if (sec.id) sectionMap[sec.id] = sec;
        }

        // Step 3: Process each spine item in order
        var promises = [];
        for (var si = 0; si < spineOrder.length; si++) {
          (function(idref, index) {
            var href = manifestMap[idref];
            if (!href) {
              promises.push(Promise.resolve({ index: index, idref: idref, title: idref, clips: [] }));
              return;
            }

            var xhtmlPath = opfDir + href;
            var xhtmlFile = currentZip.file(xhtmlPath);
            if (!xhtmlFile) {
              promises.push(Promise.resolve({ index: index, idref: idref, title: idref, clips: [] }));
              return;
            }

            promises.push(xhtmlFile.async('string').then(function(xhtmlContent) {
              var clips = [];
              var sectionData = sectionMap[idref];
              var config = sectionData ? sectionData.sceneCraftConfig : null;

              // Extract a title from the xhtml
              var titleMatch = xhtmlContent.match(/<title[^>]*>([^<]+)<\/title>/i);
              var sectionTitle = (titleMatch && titleMatch[1].trim()) || (sectionData && sectionData.title) || idref;

              if (config) {
                if (config.voiceMode === 'narration' && config.narrationFilename) {
                  clips.push({ idx: 0, filename: config.narrationFilename, type: 'narration' });
                } else if (config.voiceMode === 'dialogue') {
                  // Collect clips from stickyClips, dialogueClips, paraClips
                  var clipSources = [
                    { obj: config.stickyClips, type: 'sticky' },
                    { obj: config.dialogueClips, type: 'dialogue' },
                    { obj: config.paraClips, type: 'para' }
                  ];
                  for (var cs = 0; cs < clipSources.length; cs++) {
                    var src = clipSources[cs];
                    if (src.obj) {
                      var clipKeys = Object.keys(src.obj);
                      for (var ck = 0; ck < clipKeys.length; ck++) {
                        var elemIdx = parseInt(clipKeys[ck], 10);
                        var clip = src.obj[clipKeys[ck]];
                        if (clip && clip.filename) {
                          clips.push({ idx: elemIdx, filename: clip.filename, type: src.type });
                        }
                      }
                    }
                  }
                  // Sort by element index (DOM order)
                  clips.sort(function(a, b) { return a.idx - b.idx; });
                }
              }

              // Also scan xhtml for inline <audio><source> tags
              var domParser = new DOMParser();
              var xhtmlDoc = domParser.parseFromString(xhtmlContent, 'text/html');
              var audioSources = xhtmlDoc.querySelectorAll('audio source');
              for (var as = 0; as < audioSources.length; as++) {
                var srcAttr = audioSources[as].getAttribute('src');
                if (srcAttr) {
                  // Normalize path: remove leading ./ or audio/ prefix variations
                  var audioFilename = srcAttr.replace(/^(\.\/)?audio\//, '');
                  // Check it's not an ambient file already covered by config
                  if (config && config.ambientFilename && audioFilename === config.ambientFilename) continue;
                  // Check it's not already in our clips list
                  var alreadyIncluded = false;
                  for (var ai = 0; ai < clips.length; ai++) {
                    if (clips[ai].filename === audioFilename) { alreadyIncluded = true; break; }
                  }
                  if (!alreadyIncluded) {
                    clips.push({ idx: 9999 + as, filename: audioFilename, type: 'inline' });
                  }
                }
              }

              // Deduplicate clips (same filename from multiple sources)
              var seen = {};
              var uniqueClips = [];
              for (var uc = 0; uc < clips.length; uc++) {
                if (!seen[clips[uc].filename]) {
                  seen[clips[uc].filename] = true;
                  uniqueClips.push(clips[uc]);
                }
              }

              return { index: index, idref: idref, title: sectionTitle, clips: uniqueClips };
            }));
          })(spineOrder[si], si);
        }

        return Promise.all(promises).then(function(results) {
          // Sort by original spine index
          results.sort(function(a, b) { return a.index - b.index; });

          // Filter to only sections with audio
          var sectionsWithAudio = [];
          var allClipPaths = [];
          for (var r = 0; r < results.length; r++) {
            if (results[r].clips.length > 0) {
              sectionsWithAudio.push(results[r]);
              for (var c = 0; c < results[r].clips.length; c++) {
                allClipPaths.push(opfDir + 'audio/' + results[r].clips[c].filename);
              }
            }
          }

          // Calculate total audio size
          var totalSize = 0;
          for (var p = 0; p < allClipPaths.length; p++) {
            var audioFile = currentZip.file(allClipPaths[p]);
            if (audioFile && audioFile._data && audioFile._data.uncompressedSize) {
              totalSize += audioFile._data.uncompressedSize;
            }
          }

          // Build the self-contained shell script
          var epubName = (document.getElementById('epub-title').textContent || 'book.epub').replace(/\.epub$/i, '');
          var safeName = epubName.replace(/[^a-zA-Z0-9_-]/g, '_');
          var workDir = '/tmp/' + safeName + '_audiobook';

          var filelistLines = [];
          for (var fl = 0; fl < allClipPaths.length; fl++) {
            filelistLines.push("file '" + allClipPaths[fl] + "'");
          }
          var filelistContent = filelistLines.join('\n');

          var command = '#!/bin/bash\n';
          command += '# Audiobook generator for: ' + epubName + '\n';
          command += '# Generated by EPUB X-Ray\n\n';
          command += 'set -e\n\n';
          command += 'EPUB_PATH="$1"\n';
          command += 'if [ -z "$EPUB_PATH" ]; then\n';
          command += '  echo "Usage: $0 <path-to-epub>"\n';
          command += '  exit 1\n';
          command += 'fi\n\n';
          command += 'if [ ! -f "$EPUB_PATH" ]; then\n';
          command += '  echo "Error: File not found: $EPUB_PATH"\n';
          command += '  exit 1\n';
          command += 'fi\n\n';
          command += 'if ! command -v ffmpeg &> /dev/null; then\n';
          command += '  echo "Error: ffmpeg not installed. Install with: brew install ffmpeg"\n';
          command += '  exit 1\n';
          command += 'fi\n\n';
          command += 'WORK_DIR="' + workDir + '"\n';
          command += 'mkdir -p "$WORK_DIR"\n\n';
          command += 'echo "Extracting EPUB..."\n';
          command += 'unzip -o "$EPUB_PATH" -d "$WORK_DIR"\n\n';
          command += 'echo "Creating audio file list..."\n';
          command += 'cat > "$WORK_DIR/filelist.txt" << \'EOF\'\n';
          command += filelistContent + '\n';
          command += 'EOF\n\n';
          command += 'echo "Concatenating ' + allClipPaths.length + ' audio files..."\n';
          command += 'cd "$WORK_DIR"\n';
          command += 'ffmpeg -f concat -safe 0 -i filelist.txt -c copy audiobook.mp3\n\n';
          command += 'echo ""\n';
          command += 'echo "Done! Audiobook saved to: $WORK_DIR/audiobook.mp3"';

          return {
            sections: sectionsWithAudio,
            allClipPaths: allClipPaths,
            totalSize: totalSize,
            command: command,
            epubName: epubName
          };
        });
      });
    });
  }

  function renderAudiobookResults(result) {
    var body = document.getElementById('content-body');
    var infoEl = document.getElementById('content-info');

    if (result.allClipPaths.length === 0) {
      body.innerHTML = '<div class="audiobook-none">No audio files found in this EPUB.<br>This EPUB may not have SceneCraft audio.</div>';
      infoEl.textContent = '';
      return;
    }

    infoEl.textContent = result.allClipPaths.length + ' audio files \u2022 ' + formatFileSize(result.totalSize);

    var html = '<div class="audiobook-results">';
    html += '<h2>Audiobook: ' + escapeHtml(result.epubName) + '</h2>';
    html += '<p class="audiobook-summary">' + result.allClipPaths.length + ' audio clips across ' +
            result.sections.length + ' sections \u2022 ' + formatFileSize(result.totalSize) + ' total</p>';

    // Section-by-section breakdown
    for (var s = 0; s < result.sections.length; s++) {
      var sec = result.sections[s];
      html += '<div class="audiobook-section">';
      html += '<h3>' + escapeHtml(sec.title) + '</h3>';
      html += '<ul class="clip-list">';
      for (var c = 0; c < sec.clips.length; c++) {
        var clip = sec.clips[c];
        var label = clip.filename;
        if (clip.type === 'narration') label += ' (narration)';
        html += '<li>' + escapeHtml(label) + '</li>';
      }
      html += '</ul></div>';
    }

    // Shell script block
    html += '<div class="audiobook-command">';
    html += '<h3>Shell Script</h3>';
    html += '<p style="margin:0 0 8px 0;color:#aaa;font-size:13px;">Save as <code>audiobook.sh</code>, then run:</p>';
    html += '<pre style="margin:0 0 10px 0;padding:6px 10px;background:#1a1a2e;border-radius:4px;font-size:13px;color:#e0e0e0;">chmod +x audiobook.sh && ./audiobook.sh /path/to/' + escapeHtml(result.epubName) + '.epub</pre>';
    html += '<pre id="audiobook-cmd-text">' + escapeHtml(result.command) + '</pre>';
    html += '<button class="audiobook-copy-btn" onclick="copyAudiobookCommand()">Copy Script</button>';
    html += '</div></div>';

    body.innerHTML = html;
  }

  window.copyAudiobookCommand = function() {
    var cmdEl = document.getElementById('audiobook-cmd-text');
    if (!cmdEl) return;
    var text = cmdEl.textContent;
    var btn = cmdEl.parentElement.querySelector('.audiobook-copy-btn');
    navigator.clipboard.writeText(text).then(function() {
      if (btn) { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy Script'; }, 2000); }
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); if (btn) { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy Script'; }, 2000); } }
      catch(e) { if (btn) { btn.textContent = 'Failed'; setTimeout(function() { btn.textContent = 'Copy Script'; }, 2000); } }
      document.body.removeChild(ta);
    });
  };

  // ── Reset to upload screen ──
  window.resetToUpload = function() {
    document.getElementById('xray-viewer').style.display = 'none';
    document.getElementById('upload-screen').style.display = 'flex';
    cleanupImageUrl();
    currentZip = null;
    currentTree = null;
    selectedPath = null;
    currentContent = null;
    currentViewMode = 'source';
    document.getElementById('file-input').value = '';
    document.getElementById('audiobook-btn').style.display = 'none';
  };

  // ── Handle file upload ──
  function handleFile(file) {
    if (!file || !file.name.toLowerCase().endsWith('.epub')) {
      alert('Please select an .epub file');
      return;
    }
    loadEpub(file);
  }

  function loadEpub(file) {
    document.getElementById('upload-screen').style.display = 'none';
    var viewer = document.getElementById('xray-viewer');
    viewer.style.display = 'flex';
    document.getElementById('epub-title').textContent = file.name;
    document.getElementById('file-tree').innerHTML = '<div class="loading">Loading structure...</div>';
    document.getElementById('content-empty').style.display = 'flex';
    document.getElementById('content-viewer').style.display = 'none';

    cleanupImageUrl();
    currentContent = null;
    selectedPath = null;
    currentViewMode = 'source';

    loadEpubStructure(file).then(function(result) {
      currentZip = result.zip;
      currentTree = result.tree;
      renderFileTree(currentTree);
      // Show audiobook button now that EPUB is loaded
      document.getElementById('audiobook-btn').style.display = 'inline-block';
    }).catch(function(err) {
      document.getElementById('file-tree').innerHTML =
        '<div class="tree-error"><p>Error loading EPUB</p><p>' +
        escapeHtml(err.message) + '</p></div>';
    });
  }

  // ── Initialization ──
  document.addEventListener('DOMContentLoaded', function() {
    // File input handler
    var fileInput = document.getElementById('file-input');
    fileInput.addEventListener('change', function(e) {
      if (e.target.files && e.target.files.length) handleFile(e.target.files[0]);
    });

    // Drag and drop on drop zone
    var dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', function(e) {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer && e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    // Prevent browser default drag behavior on entire document
    document.addEventListener('dragover', function(e) { e.preventDefault(); });
    document.addEventListener('drop', function(e) { e.preventDefault(); });

    // View toggle (Source/Preview)
    var viewToggle = document.getElementById('view-toggle');
    viewToggle.addEventListener('click', function(e) {
      var btn = e.target;
      if (!btn.classList.contains('toggle-btn')) return;
      var mode = btn.getAttribute('data-mode');
      if (mode === currentViewMode) return;
      currentViewMode = mode;
      var btns = viewToggle.querySelectorAll('.toggle-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].getAttribute('data-mode') === mode);
      }
      if (mode === 'preview' && selectedPath) {
        showPreview(selectedPath);
      } else if (currentContent && currentContent.type === 'text') {
        renderSourceView(currentContent.content.split('\n'));
      }
    });
  });
})();
</script>
